spring.application.name=tienda

#Se define el puerto por donde escuvha el servidor web
server.port=80

#Se define el formato del log fecha/hora
logging.patter.dateformat=hh:mm

#Se avita mostrar el banner SPRING en el log
spring.main.banner-mode=off

#Se evita el uso de cache en desarrollo y se activa en produccion
spring.thymeleaf.cache=false


#Conexion local a la BD Techshop en MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/techshop
spring.datasource.url=jdbc:mysql://mysql-190a6cd4-iramirez10618-b4e8.l.aivencloud.com:21615/techshop
 
#Usuario y clave de creaTablas.sql
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.
 
#Driver y plataforma de comunicaci\u00c3\u00b3n
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
#mostrar informaci\u00c3\u00b3n en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE
